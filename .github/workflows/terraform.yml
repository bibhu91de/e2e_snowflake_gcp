name: Terraform Apply

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  id-token: write   # REQUIRED for GCP Workload Identity Federation

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔐 Authenticate GitHub → GCP (NO KEYS)
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/243453074532/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "terraform-ci@project-d938e8ef-98b9-4e42-9e8.iam.gserviceaccount.com"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve
